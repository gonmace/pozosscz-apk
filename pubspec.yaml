name: pozosscz
description: "Aplicacion para choferes del servicio PozosSCZ."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navegacion
  go_router: ^14.8.1

  # HTTP
  dio: ^5.7.0

  # Almacenamiento seguro del token
  flutter_secure_storage: ^9.2.4

  # Ubicacion
  geolocator: ^13.0.2
  flutter_foreground_task: ^8.16.0

  # Abrir URLs (WhatsApp, Google Maps)
  url_launcher: ^6.3.1

  # Animaciones de lista
  flutter_animate: ^4.5.2

  # SVG
  flutter_svg: ^2.0.17

  # Fuente Nunito
  google_fonts: ^6.2.1

  # WebView (pantalla administrador)
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.11.0

  # Firebase
  firebase_core: ^3.13.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
